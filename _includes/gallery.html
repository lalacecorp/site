<div class="image-gallery">
  {% assign sorted = site.static_files %}
  {% for file in sorted %}
    {% if file.path contains include.folder %}
      {% assign filenameparts = file.path | split: "/" %}
      {% assign filename = filenameparts | last | replace: file.extname,"" %}
       <div class="box"><a href="{{ file.path | relative_url }}" title="{{ filename }}" data-lightbox="{{ filename }}" data-title="{{ filename }}">
         <img src="{{ file.path | replace: include.folder,site.thumbs_folder | relative_url }}" alt="{{ filename }}"  class="img-gallery" />
         <br />{{ file.basename }}
       </a></div>
    {% endif %}
  {% endfor %}
 </div>
